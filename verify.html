<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate verifier</title>
<meta name="robots" content="noindex">
<style>
  :root {
    --bg: #eef1f6; --card: #fff; --ink: #1c2333; --muted: #6b7385;
    --line: #dde2ec; --accent: #4353e8; --wrong: #e5484d; --good: #1c9e6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    font-size: 16px; line-height: 1.5;
    display: flex; justify-content: center;
    padding: clamp(12px, 4vw, 40px) 12px;
  }
  .app { width: 100%; max-width: 640px; }
  h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  p.sub { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  .card {
    background: var(--card); border-radius: 16px; padding: clamp(16px, 4vw, 28px);
    box-shadow: 0 1px 2px rgba(28,35,51,.06), 0 8px 24px rgba(28,35,51,.08);
  }
  textarea {
    width: 100%; min-height: 110px; resize: vertical;
    font-family: ui-monospace, Consolas, monospace; font-size: 13px;
    padding: 10px; border-radius: 10px;
    border: 1.5px solid var(--line); background: var(--bg); color: var(--ink);
  }
  textarea:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button {
    font: inherit; font-weight: 700; border: none; border-radius: 12px;
    padding: 12px 24px; cursor: pointer;
    background: var(--accent); color: #fff; margin-top: 12px;
  }
  #result { margin-top: 18px; }
  .verdict { font-weight: 800; font-size: 18px; margin-bottom: 10px; }
  .verdict.ok { color: var(--good); }
  .verdict.bad { color: var(--wrong); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  td { padding: 5px 8px 5px 0; vertical-align: top; }
  td:first-child { color: var(--muted); white-space: nowrap; }
  .mono { font-family: ui-monospace, Consolas, monospace; }
  .check { font-weight: 700; }
  .check.ok { color: var(--good); }
  .check.bad { color: var(--wrong); }
  .note { color: var(--muted); font-size: 13px; margin-top: 14px; }
</style>
</head>
<body>
<div class="app">
  <h1>Certificate verifier</h1>
  <p class="sub">
    Paste the small data line from the bottom of a certificate below.
    Line breaks from PDF copy/paste are fine — whitespace is ignored.
    NL: plak de gegevensregel van onderaan het certificaat.
    FR: colle la ligne de donn&eacute;es du bas du certificat.
  </p>
  <div class="card">
    <textarea id="input" spellcheck="false"
      placeholder="3.0|Naam|12|60|8|G|123456789ABC|123456789ABC|1A2B3C4D|42|7.8+,3.4-,..."></textarea>
    <button id="run">Verify</button>
    <div id="result"></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  // NOTE: cyrb53, codeFromText, mulberry32, the proof format, and each
  // replay implementation below must stay byte-for-byte compatible with
  // the game (maaltafels/index.html) at the corresponding PROOF_VERSION.
  // When the game's draw rules change: bump PROOF_VERSION there, add a new
  // replay function here, and KEEP the old ones so old certificates stay
  // verifiable.

  function cyrb53(str) {
    var h1 = 0xdeadbeef, h2 = 0x41c6ce57, ch;
    for (var i = 0; i < str.length; i++) {
      ch = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return 4294967296 * (2097151 & h2) + (h1 >>> 0);
  }
  function codeFromText(str) {
    var hex = cyrb53(str).toString(16).toUpperCase();
    while (hex.length < 12) hex = "0" + hex;
    return hex.slice(-12).match(/.{1,4}/g).join("-");
  }
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  /* ---------------- replay implementations, one per version ------------ */
  // Each takes (seed, max, tokens) and returns:
  //   { failAt, expected, got, solvedCount }
  // where failAt === -1 means the whole sequence replays cleanly.

  // v2.0 — seeded mulberry32; the previous question and its commutative
  // mirror (y×x) are excluded from the next draw when still unsolved,
  // dropped mirror-first if they would empty the pool; cells scanned in
  // row-major order.
  function replayV20(seed, max, tokens) {
    var rng = mulberry32(seed);
    var solved = {};
    var remaining = max * max;
    var solvedCount = 0;
    var prevR = 0, prevC = 0;

    for (var i = 0; i < tokens.length; i++) {
      var m = /^(\d+)\.(\d+)([+-])$/.exec(tokens[i]);
      if (!m) return { failAt: i, expected: "r.c+ or r.c-", got: tokens[i], solvedCount: solvedCount };
      var r = parseInt(m[1], 10), c = parseInt(m[2], 10);

      var excl = [];
      if (prevR !== 0) {
        if (!solved[prevR + "-" + prevC]) excl.push([prevR, prevC]);
        if (prevR !== prevC && !solved[prevC + "-" + prevR]) excl.push([prevC, prevR]);
        while (excl.length && remaining - excl.length < 1) excl.pop();
      }
      var poolSize = remaining - excl.length;
      var pick = Math.floor(rng() * poolSize);
      var er = 0, ec = 0, k = 0;
      outer:
      for (er = 1; er <= max; er++) {
        for (ec = 1; ec <= max; ec++) {
          if (solved[er + "-" + ec]) continue;
          var isExcl = false;
          for (var x = 0; x < excl.length; x++) {
            if (excl[x][0] === er && excl[x][1] === ec) { isExcl = true; break; }
          }
          if (isExcl) continue;
          if (k === pick) break outer;
          k++;
        }
      }
      if (er !== r || ec !== c) {
        return { failAt: i, expected: er + "." + ec, got: r + "." + c, solvedCount: solvedCount };
      }
      if (m[3] === "+") {
        solved[r + "-" + c] = true;
        remaining--;
        solvedCount++;
      }
      prevR = r; prevC = c;
    }
    return { failAt: -1, expected: null, got: null, solvedCount: solvedCount };
  }

  // v3.0 — like v2.0, plus: a mode (G/P/T) and enabled rows/columns are
  // part of the proof.
  //   G (Game): full grid, OR selection, weighted draws; misses stay in
  //     the pool.
  //   P (Practice): row AND column subset, uniform draws; misses stay in
  //     the pool.
  //   T (Teacher): one table (OR selection), uniform draws, once-through:
  //     every shown cell leaves the pool whatever the outcome; the
  //     game-seconds field holds elapsed completion time (informational).
  // The prev + commutative-mirror exclusion applies in all modes.
  function replayV30(seed, max, mode, rowsHex, colsHex, tokens) {
    var HEXD = "123456789ABC";
    var selRows = {}, selCols = {}, i, r, c;
    for (i = 0; i < rowsHex.length; i++) selRows[HEXD.indexOf(rowsHex[i]) + 1] = true;
    for (i = 0; i < colsHex.length; i++) selCols[HEXD.indexOf(colsHex[i]) + 1] = true;
    function inSel(r, c) {
      if (mode === "P") return selRows[r] === true && selCols[c] === true;
      return selRows[r] === true || selCols[c] === true;
    }
    function weight(r, c) {
      if (mode !== "G") return 1;
      if (Math.min(r, c) === 11) return 3;
      if (r === 1 || c === 1 || r === 10 || c === 10 || r === 11 || c === 11) return 2;
      if (r === 2 || c === 2) return 3;
      return 6;
    }
    var totalSel = 0;
    for (r = 1; r <= max; r++) for (c = 1; c <= max; c++) if (inSel(r, c)) totalSel++;
    if (totalSel === 0) {
      return { failAt: 0, expected: "a non-empty table selection", got: "rows=" + rowsHex + " cols=" + colsHex, solvedCount: 0 };
    }

    var rng = mulberry32(seed);
    var done = {};                       // removed from the draw pool
    var doneCount = 0;
    var solvedCount = 0;                 // correct answers (the score)
    var prevR = 0, prevC = 0;

    for (i = 0; i < tokens.length; i++) {
      var m = /^(\d+)\.(\d+)([+-])$/.exec(tokens[i]);
      if (!m) return { failAt: i, expected: "r.c+ or r.c-", got: tokens[i], solvedCount: solvedCount };
      r = parseInt(m[1], 10); c = parseInt(m[2], 10);

      var remainingSel = totalSel - doneCount;
      var excl = [];
      if (prevR !== 0) {
        if (!done[prevR + "-" + prevC] && inSel(prevR, prevC)) excl.push([prevR, prevC]);
        if (prevR !== prevC && !done[prevC + "-" + prevR] && inSel(prevC, prevR)) excl.push([prevC, prevR]);
        while (excl.length && remainingSel - excl.length < 1) excl.pop();
      }

      var W = 0, er, ec, x, isExcl;
      for (er = 1; er <= max; er++) {
        for (ec = 1; ec <= max; ec++) {
          if (done[er + "-" + ec] || !inSel(er, ec)) continue;
          isExcl = false;
          for (x = 0; x < excl.length; x++) if (excl[x][0] === er && excl[x][1] === ec) { isExcl = true; break; }
          if (isExcl) continue;
          W += weight(er, ec);
        }
      }
      var pick = Math.floor(rng() * W);
      var acc = 0;
      outer:
      for (er = 1; er <= max; er++) {
        for (ec = 1; ec <= max; ec++) {
          if (done[er + "-" + ec] || !inSel(er, ec)) continue;
          isExcl = false;
          for (x = 0; x < excl.length; x++) if (excl[x][0] === er && excl[x][1] === ec) { isExcl = true; break; }
          if (isExcl) continue;
          acc += weight(er, ec);
          if (pick < acc) break outer;
        }
      }
      if (er !== r || ec !== c) {
        return { failAt: i, expected: er + "." + ec, got: r + "." + c, solvedCount: solvedCount };
      }
      if (m[3] === "+") solvedCount++;
      if (mode === "T" || m[3] === "+") {   // Teacher: shown once = out of the pool
        done[r + "-" + c] = true;
        doneCount++;
      }
      prevR = r; prevC = c;
    }
    return { failAt: -1, expected: null, got: null, solvedCount: solvedCount };
  }

  var ALGORITHMS = {
    "2.0": replayV20,
    "3.0": replayV30
    // future: "4.0": replayV40, ... — never delete old entries
  };

  /* ---------------------------- verification --------------------------- */
  // Proof line formats:
  //   v2.0: version|name|max|gameSec|qSec|seedHex|score|sequence           (8 fields)
  //   v3.0: version|name|max|gameSec|qSec|mode|rows|cols|seedHex|score|seq (11 fields)
  var FIELD_COUNTS = { "2.0": 8, "3.0": 11 };

  function verify(raw) {
    var text = (raw || "").replace(/\s+/g, "");
    if (!text) return { error: "Nothing to verify." };
    var parts = text.split("|");

    var version = parts[0];
    if (!/^\d+(\.\d+)?$/.test(version)) return { error: "First field is not a version number." };
    if (!ALGORITHMS[version]) {
      return { error: "Unknown algorithm version " + version + " — this verifier supports: " +
        Object.keys(ALGORITHMS).join(", ") + ". A newer copy of this page may be needed." };
    }
    if (parts.length !== FIELD_COUNTS[version]) {
      return { error: "Version " + version + " expects " + FIELD_COUNTS[version] +
        " fields separated by | — got " + parts.length + "." };
    }

    var name = parts[1];
    var max = parseInt(parts[2], 10), gameSec = parseInt(parts[3], 10),
        qSec = parseInt(parts[4], 10);
    if (!(max >= 2 && max <= 12) || !gameSec || !qSec) {
      return { error: "Settings fields are not valid numbers." };
    }

    var mode = null, rowsHex = "", colsHex = "", seedField, scoreField, seqField;
    if (version === "2.0") {
      seedField = parts[5]; scoreField = parts[6]; seqField = parts[7];
    } else {
      mode = parts[5];
      if (mode !== "G" && mode !== "P" && mode !== "T") return { error: "Mode must be G, P or T." };
      rowsHex = parts[6].toUpperCase(); colsHex = parts[7].toUpperCase();
      if (!/^[1-9A-C]*$/.test(rowsHex) || !/^[1-9A-C]*$/.test(colsHex)) {
        return { error: "Rows/columns fields contain invalid characters." };
      }
      seedField = parts[8]; scoreField = parts[9]; seqField = parts[10];
    }

    var declaredScore = parseInt(scoreField, 10);
    if (isNaN(declaredScore)) return { error: "Score is not a number." };
    if (!/^[0-9A-F]{8}$/i.test(seedField)) return { error: "Seed is not 8 hex characters." };
    var seed = parseInt(seedField, 16);

    var tokens = seqField === "" ? [] : seqField.split(",");
    var rep = (version === "2.0")
      ? replayV20(seed, max, tokens)
      : replayV30(seed, max, mode, rowsHex, colsHex, tokens);

    return {
      version: version,
      name: name.replace(/_/g, " "),
      max: max, gameSec: gameSec, qSec: qSec,
      mode: mode, rowsHex: rowsHex, colsHex: colsHex,
      declaredScore: declaredScore,
      replayedScore: rep.solvedCount,
      questionsShown: tokens.length,
      seedHex: seedField.toUpperCase(),
      seqOk: rep.failAt === -1,
      failAt: rep.failAt, expected: rep.expected, got: rep.got,
      scoreOk: rep.failAt === -1 && rep.solvedCount === declaredScore,
      code: codeFromText(text)
    };
  }

  function hexToList(s) {
    var HEXD = "123456789ABC", out = [];
    for (var i = 0; i < s.length; i++) out.push(HEXD.indexOf(s[i]) + 1);
    return out.join(", ");
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  document.getElementById("run").addEventListener("click", function () {
    var res = verify(document.getElementById("input").value);
    var box = document.getElementById("result");
    if (res.error) {
      box.innerHTML = '<div class="verdict bad">✗ ' + esc(res.error) + '</div>';
      return;
    }
    var ok = res.seqOk && res.scoreOk;
    var html = '<div class="verdict ' + (ok ? 'ok' : 'bad') + '">' +
      (ok ? '✓ Consistent — now compare the code below with the one printed on the certificate.'
          : '✗ This data does not describe a real game.') + '</div>';
    html += '<table>';
    html += '<tr><td>Algorithm version</td><td class="mono">' + esc(res.version) + '</td></tr>';
    html += '<tr><td>Player</td><td>' + esc(res.name) + '</td></tr>';
    html += '<tr><td>Settings</td><td>tables up to ' + res.max + ' · ' +
      (res.mode === "T" ? 'completed in ' + res.gameSec + ' s' : res.gameSec + ' s game') +
      ' · ' + res.qSec + ' s per question</td></tr>';
    if (res.mode) {
      var modeName = { G: "Game (weighted draws)", P: "Practice (row \u00d7 column subset)", T: "Teacher (one table, once-through)" }[res.mode];
      html += '<tr><td>Mode</td><td>' + modeName + '</td></tr>';
      html += '<tr><td>Enabled tables</td><td>rows: ' + (esc(hexToList(res.rowsHex)) || "—") +
              ' · columns: ' + (esc(hexToList(res.colsHex)) || "—") + '</td></tr>';
    }
    html += '<tr><td>Seed</td><td class="mono">' + esc(res.seedHex) + '</td></tr>';
    html += '<tr><td>Questions shown</td><td>' + res.questionsShown + '</td></tr>';
    html += '<tr><td>Sequence replay</td><td class="check ' + (res.seqOk ? 'ok' : 'bad') + '">' +
      (res.seqOk ? 'matches the seed'
                 : 'diverges at question ' + (res.failAt + 1) + ' — expected ' + esc(res.expected) + ', found ' + esc(res.got)) +
      '</td></tr>';
    html += '<tr><td>Score</td><td class="check ' + (res.scoreOk ? 'ok' : 'bad') + '">declared ' + res.declaredScore +
      ', replayed ' + res.replayedScore + (res.scoreOk ? ' ✓' : ' ✗') + '</td></tr>';
    html += '<tr><td>Recomputed code</td><td class="mono" style="font-weight:700">' + res.code + '</td></tr>';
    html += '</table>';
    html += '<p class="note">A certificate is genuine when the sequence replays, the score matches, ' +
      'and the recomputed code equals the code printed on the certificate.</p>';
    box.innerHTML = html;
  });
})();
</script>
</body>
</html>
